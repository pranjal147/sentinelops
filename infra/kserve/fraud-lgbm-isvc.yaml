apiVersion: v1
kind: Namespace
metadata:
  name: serving
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: serving
  annotations:
    serving.kserve.io/s3-endpoint: minio.platform.svc.cluster.local:9000
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: us-east-1
    serving.kserve.io/s3-useanoncredential: "false"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minio
  AWS_SECRET_ACCESS_KEY: minio123
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-minio-sa
  namespace: serving
secrets:
  - name: minio-credentials
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: fraud-lgbm
  namespace: serving
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    serviceAccountName: kserve-minio-sa
    lightgbm:
      storageUri: s3://models/fraud-lgbm/1
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
