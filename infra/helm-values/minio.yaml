# Official MinIO Helm chart values
# Repo: https://charts.min.io/
# Chart version: 5.4.0
# App version: RELEASE.2024-12-18T13-15-44Z

mode: standalone

# Pinned image versions (matching the chart's defaults but explicit for reproducibility)
image:
  repository: quay.io/minio/minio
  tag: RELEASE.2024-12-18T13-15-44Z
  pullPolicy: IfNotPresent

mcImage:
  repository: quay.io/minio/mc
  tag: RELEASE.2024-11-21T17-21-54Z
  pullPolicy: IfNotPresent

# Credentials (overridden by Terraform set/set_sensitive)
rootUser: minio
rootPassword: minio123

# Storage
persistence:
  enabled: true
  size: 10Gi
  storageClass: "local-path"

# Resources
resources:
  requests:
    memory: 256Mi
    cpu: 100m

# Service ports
service:
  type: ClusterIP
  port: 9000

consoleService:
  type: ClusterIP
  port: 9001

# Single replica for dev
replicas: 1

# Pre-create buckets via post-install job
buckets:
  - name: mlflow-artifacts
    policy: none
    purge: false
  - name: kfp-artifacts
    policy: none
    purge: false
  - name: datasets
    policy: none
    purge: false

# Post-install job to create buckets — minimal config
postJob:
  podAnnotations: {}
  securityContext:
    enabled: false
  resources:
    requests:
      memory: 128Mi
      cpu: 50m

# Disable serviceMonitor for now (we'll enable on Day 8 when Prometheus arrives)
metrics:
  serviceMonitor:
    enabled: false