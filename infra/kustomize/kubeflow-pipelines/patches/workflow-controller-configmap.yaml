apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-controller-configmap
data:
  # Override the default argoexec image (gcr.io/ml-pipeline/argoexec) which was
  # deleted when gcr.io shut down in March 2025. Use the upstream Argo image on
  # quay.io instead. Version must match the workflow-controller bundled in KFP.
  executor: |
    image: quay.io/argoproj/argoexec:v3.4.17
    imagePullPolicy: IfNotPresent
