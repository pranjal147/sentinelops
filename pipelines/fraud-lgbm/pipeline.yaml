# PIPELINE DEFINITION
# Name: fraud-lgbm-pipeline
# Description: LightGBM fraud detection
# Inputs:
#    auc_threshold: float [Default: 0.95]
#    experiment_name: str [Default: 'fraud-lgbm']
#    mlflow_tracking_uri: str [Default: 'http://mlflow.mlops.svc.cluster.local:5000']
#    s3_bucket: str [Default: 'datasets']
#    s3_endpoint: str [Default: 'http://minio.platform.svc.cluster.local:9000']
#    s3_key: str [Default: 'fraud/creditcard.csv']
# Outputs:
#    evaluate-metrics_out: system.Metrics
components:
  comp-evaluate:
    executorLabel: exec-evaluate
    inputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        auc_threshold:
          defaultValue: 0.95
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        metrics_out:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
  comp-load-data:
    executorLabel: exec-load-data
    inputDefinitions:
      parameters:
        s3_bucket:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        s3_key:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        data_out:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-preprocess:
    executorLabel: exec-preprocess
    inputDefinitions:
      artifacts:
        data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        random_state:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        test_size:
          defaultValue: 0.2
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        test_out:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_out:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-train:
    executorLabel: exec-train
    inputDefinitions:
      artifacts:
        train_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        experiment_name:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        model_out:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-validate-data:
    executorLabel: exec-validate-data
    inputDefinitions:
      artifacts:
        data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-evaluate:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.5.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate(\n    test_data: Input[Dataset],\n    model: Input[Model],\n\
          \    metrics_out: Output[Metrics],\n    auc_threshold: float = 0.95,\n):\n\
          \    import pandas as pd\n    import lightgbm as lgb\n    from sklearn.metrics\
          \ import roc_auc_score, average_precision_score\n\n    df = pd.read_parquet(test_data.path)\n\
          \    X_test = df.drop(columns=[\"Class\"])\n    y_test = df[\"Class\"]\n\
          \n    booster = lgb.Booster(model_file=model.path)\n    y_prob = booster.predict(X_test)\n\
          \n    auc = roc_auc_score(y_test, y_prob)\n    avg_precision = average_precision_score(y_test,\
          \ y_prob)\n\n    metrics_out.log_metric(\"test_auc\", auc)\n    metrics_out.log_metric(\"\
          avg_precision\", avg_precision)\n\n    print(f\"test_auc={auc:.4f}, avg_precision={avg_precision:.4f}\"\
          )\n\n    if auc < auc_threshold:\n        raise ValueError(\n          \
          \  f\"AUC {auc:.4f} below threshold {auc_threshold}. Aborting.\"\n     \
          \   )\n\n    print(f\"Model passed quality gate (AUC {auc:.4f} >= {auc_threshold})\"\
          )\n\n"
        image: k3d-registry.localhost:5000/fraud-component:v4
    exec-load-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - load_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.5.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef load_data(\n    s3_endpoint: str,\n    s3_bucket: str,\n    s3_key:\
          \ str,\n    data_out: Output[Dataset],\n):\n    import boto3\n    from botocore.client\
          \ import Config\n\n    s3 = boto3.client(\n        \"s3\",\n        endpoint_url=s3_endpoint,\n\
          \        aws_access_key_id=\"minio\",\n        aws_secret_access_key=\"\
          minio123\",\n        config=Config(signature_version=\"s3v4\"),\n      \
          \  region_name=\"us-east-1\",\n    )\n    s3.download_file(s3_bucket, s3_key,\
          \ data_out.path)\n    print(f\"Downloaded s3://{s3_bucket}/{s3_key} \u2192\
          \ {data_out.path}\")\n\n"
        image: k3d-registry.localhost:5000/fraud-component:v4
    exec-preprocess:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocess
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.5.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess(\n    data: Input[Dataset],\n    train_out: Output[Dataset],\n\
          \    test_out: Output[Dataset],\n    test_size: float = 0.2,\n    random_state:\
          \ int = 42,\n):\n    import pandas as pd\n    from sklearn.model_selection\
          \ import train_test_split\n\n    df = pd.read_csv(data.path)\n\n    # Drop\
          \ the time column \u2014 not predictive across days\n    df = df.drop(columns=[\"\
          Time\"])\n\n    X = df.drop(columns=[\"Class\"])\n    y = df[\"Class\"]\n\
          \n    X_train, X_test, y_train, y_test = train_test_split(\n        X, y,\
          \ test_size=test_size, random_state=random_state, stratify=y\n    )\n\n\
          \    train_df = X_train.copy()\n    train_df[\"Class\"] = y_train.values\n\
          \    test_df = X_test.copy()\n    test_df[\"Class\"] = y_test.values\n\n\
          \    train_df.to_parquet(train_out.path, index=False)\n    test_df.to_parquet(test_out.path,\
          \ index=False)\n\n    fraud_rate = y_train.mean()\n    scale_pos_weight\
          \ = (1 - fraud_rate) / fraud_rate\n    print(\n        f\"Train: {len(train_df)}\
          \ rows, fraud_rate={fraud_rate:.4f}, \"\n        f\"scale_pos_weight={scale_pos_weight:.1f}\"\
          \n    )\n    print(f\"Test:  {len(test_df)} rows\")\n\n"
        image: k3d-registry.localhost:5000/fraud-component:v4
    exec-train:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.5.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train(\n    train_data: Input[Dataset],\n    model_out: Output[Model],\n\
          \    mlflow_tracking_uri: str,\n    experiment_name: str,\n):\n    import\
          \ os\n    import pandas as pd\n    import lightgbm as lgb\n    import mlflow\n\
          \    import mlflow.lightgbm\n    from sklearn.metrics import roc_auc_score\n\
          \n    os.environ[\"MLFLOW_S3_ENDPOINT_URL\"] = \"http://minio.platform.svc.cluster.local:9000\"\
          \n    os.environ[\"AWS_ACCESS_KEY_ID\"] = \"minio\"\n    os.environ[\"AWS_SECRET_ACCESS_KEY\"\
          ] = \"minio123\"\n\n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n \
          \   mlflow.set_experiment(experiment_name)\n\n    df = pd.read_parquet(train_data.path)\n\
          \    X_train = df.drop(columns=[\"Class\"])\n    y_train = df[\"Class\"\
          ]\n\n    fraud_rate = y_train.mean()\n    scale_pos_weight = (1 - fraud_rate)\
          \ / fraud_rate\n\n    params = {\n        \"objective\": \"binary\",\n \
          \       \"metric\": \"auc\",\n        \"n_estimators\": 300,\n        \"\
          learning_rate\": 0.05,\n        \"num_leaves\": 63,\n        \"scale_pos_weight\"\
          : scale_pos_weight,\n        \"random_state\": 42,\n        \"n_jobs\":\
          \ 2,\n        \"verbose\": -1,\n    }\n\n    with mlflow.start_run() as\
          \ run:\n        mlflow.log_params(params)\n\n        model = lgb.LGBMClassifier(**params)\n\
          \        model.fit(X_train, y_train)\n\n        train_auc = roc_auc_score(y_train,\
          \ model.predict_proba(X_train)[:, 1])\n        mlflow.log_metric(\"train_auc\"\
          , train_auc)\n\n        mlflow.lightgbm.log_model(model, \"model\")\n\n\
          \        print(f\"MLflow run_id={run.info.run_id}, train_auc={train_auc:.4f}\"\
          )\n\n    model.booster_.save_model(model_out.path)\n    print(f\"Model saved\
          \ to {model_out.path}\")\n\n"
        image: k3d-registry.localhost:5000/fraud-component:v4
    exec-validate-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - validate_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.5.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef validate_data(data: Input[Dataset]) -> str:\n    import pandas\
          \ as pd\n\n    df = pd.read_csv(data.path)\n\n    checks = {\n        \"\
          row_count\": len(df) >= 200_000,\n        \"has_class_column\": \"Class\"\
          \ in df.columns,\n        \"no_missing_values\": df.isnull().sum().sum()\
          \ == 0,\n        \"fraud_rate_plausible\": 0.001 <= df[\"Class\"].mean()\
          \ <= 0.01,\n        \"feature_count\": len(df.columns) == 31,\n    }\n\n\
          \    failures = [name for name, passed in checks.items() if not passed]\n\
          \    if failures:\n        raise ValueError(f\"Validation failed: {failures}\"\
          )\n\n    summary = (\n        f\"rows={len(df)}, fraud_rate={df['Class'].mean():.4f},\
          \ \"\n        f\"cols={len(df.columns)}\"\n    )\n    print(f\"Validation\
          \ passed: {summary}\")\n    return summary\n\n"
        image: k3d-registry.localhost:5000/fraud-component:v4
pipelineInfo:
  description: LightGBM fraud detection
  name: fraud-lgbm-pipeline
root:
  dag:
    outputs:
      artifacts:
        evaluate-metrics_out:
          artifactSelectors:
          - outputArtifactKey: metrics_out
            producerSubtask: evaluate
    tasks:
      evaluate:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate
        dependentTasks:
        - preprocess
        - train
        inputs:
          artifacts:
            model:
              taskOutputArtifact:
                outputArtifactKey: model_out
                producerTask: train
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_out
                producerTask: preprocess
          parameters:
            auc_threshold:
              componentInputParameter: auc_threshold
        taskInfo:
          name: evaluate
      load-data:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-load-data
        inputs:
          parameters:
            s3_bucket:
              componentInputParameter: s3_bucket
            s3_endpoint:
              componentInputParameter: s3_endpoint
            s3_key:
              componentInputParameter: s3_key
        taskInfo:
          name: load-data
      preprocess:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-preprocess
        dependentTasks:
        - load-data
        - validate-data
        inputs:
          artifacts:
            data:
              taskOutputArtifact:
                outputArtifactKey: data_out
                producerTask: load-data
        taskInfo:
          name: preprocess
      train:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train
        dependentTasks:
        - preprocess
        inputs:
          artifacts:
            train_data:
              taskOutputArtifact:
                outputArtifactKey: train_out
                producerTask: preprocess
          parameters:
            experiment_name:
              componentInputParameter: experiment_name
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
        taskInfo:
          name: train
      validate-data:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-validate-data
        dependentTasks:
        - load-data
        inputs:
          artifacts:
            data:
              taskOutputArtifact:
                outputArtifactKey: data_out
                producerTask: load-data
        taskInfo:
          name: validate-data
  inputDefinitions:
    parameters:
      auc_threshold:
        defaultValue: 0.95
        isOptional: true
        parameterType: NUMBER_DOUBLE
      experiment_name:
        defaultValue: fraud-lgbm
        isOptional: true
        parameterType: STRING
      mlflow_tracking_uri:
        defaultValue: http://mlflow.mlops.svc.cluster.local:5000
        isOptional: true
        parameterType: STRING
      s3_bucket:
        defaultValue: datasets
        isOptional: true
        parameterType: STRING
      s3_endpoint:
        defaultValue: http://minio.platform.svc.cluster.local:9000
        isOptional: true
        parameterType: STRING
      s3_key:
        defaultValue: fraud/creditcard.csv
        isOptional: true
        parameterType: STRING
  outputDefinitions:
    artifacts:
      evaluate-metrics_out:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
schemaVersion: 2.1.0
sdkVersion: kfp-2.5.0
