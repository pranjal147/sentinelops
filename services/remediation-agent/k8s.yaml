apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: platform
data:
  policy.rego: |
    package remediation

    import future.keywords.if
    import future.keywords.in

    allowed_namespaces := {"serving", "platform", "mlops", "kubeflow"}

    scalable_deployments := {
        "serving/fraud-lgbm-predictor",
        "serving/prediction-logger",
        "platform/anomaly-detector",
    }

    default allow := false

    allow if {
        input.action == "restart_pod"
        input.namespace in allowed_namespaces
        input.severity in {"warning", "critical"}
    }

    allow if {
        input.action == "scale_deployment"
        key := concat("/", [input.namespace, input.deployment])
        key in scalable_deployments
        input.replicas >= 1
        input.replicas <= 5
    }

    allow if {
        input.action == "get_pod_status"
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediation-agent
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: remediation-agent
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, deployments/scale]
    verbs: [get, list, watch, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: remediation-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: remediation-agent
subjects:
  - kind: ServiceAccount
    name: remediation-agent
    namespace: platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-agent
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remediation-agent
  template:
    metadata:
      labels:
        app: remediation-agent
    spec:
      serviceAccountName: remediation-agent
      containers:
        - name: agent
          image: k3d-registry.localhost:5000/remediation-agent:v1
          env:
            - name: KAFKA_BROKERS
              value: "redpanda-0.redpanda.platform.svc.cluster.local:9093"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api_key
            - name: CLAUDE_MODEL
              value: "claude-3-5-haiku-20241022"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
        - name: opa
          image: openpolicyagent/opa:0.65.0-static
          args:
            - run
            - --server
            - --addr=:8181
            - /policies/policy.rego
          ports:
            - containerPort: 8181
          volumeMounts:
            - name: policy
              mountPath: /policies
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: policy
          configMap:
            name: opa-policy
